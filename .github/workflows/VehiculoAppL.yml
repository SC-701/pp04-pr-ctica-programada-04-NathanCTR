name: Build and deploy Web App

env:
  AZURE_WEBAPP_NAME: APISeguridadJohn    # Change this to your Azure Web App name
  AZURE_WEBAPP_PACKAGE_PATH: './Vehiculo.API/API'
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Vehiculo,Seguridad/Helpers/j'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up dependency caching for faster builds
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore "Vehiculo.API/Vehiculo.API.sln"

      - name: Build with dotnet
        run: |
          dotnet build "Vehiculo.API/Abstracciones/Abstracciones.csproj" --configuration Release --no-restore
          dotnet build "Vehiculo.API/API/API.csproj" --configuration Release --no-restore
          dotnet build "Vehiculo.API/DA/DA.csproj" --configuration Release --no-restore
          dotnet build "Vehiculo.API/Flujo/Flujo.csproj" --configuration Release --no-restore
          

      - name: Run tests
        run: dotnet test "Vehiculo.API/Vehiculo.API.sln" --no-restore --verbosity normal --configuration Release || echo "No tests found or test execution failed"

      - name: dotnet publish
        run: dotnet publish "Vehiculo.Web/Vehiculo.Web/Web.csproj" -c Release -o ./publish --no-restore

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'VehiculoL'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }} 
          publish-profile: ${{ secrets.AZURE_PROVAPP_PUBLISH_PROFILE }}
          package: .
          respect-funcignore: true
