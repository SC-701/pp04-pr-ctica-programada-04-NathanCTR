name: Publicar paquetes NuGet de Autorización

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Producto.Autorizacion/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restaurar dependencias
        run: |
          cd Producto.Autorizacion/Middleware
          dotnet restore Middleware.csproj

      - name: Compilar en Release
        run: |
          cd Producto.Autorizacion/Middleware
          dotnet build Middleware.csproj --configuration Release --no-restore

      - name: Cleanup old .nupkg files
        run: |
          rm -f Producto.Autorizacion/Middleware/nupkgs/*.nupkg

      - name: Empaquetar (dotnet pack)
        run: |
          cd Producto.Autorizacion/Middleware
          dotnet pack Middleware.csproj --configuration Release --no-build --output ./nupkgs

      - name: Set up NuGet sources
        run: dotnet nuget add source "https://nuget.pkg.github.com/SC-701/index.json" --name "github" --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Publicar en GitHub Packages
        run: |
          cd Producto.Autorizacion/Middleware
          dotnet nuget push ./nupkgs/*.nupkg --source "https://nuget.pkg.github.com/SC-701/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
